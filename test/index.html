<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="icon" type="image/png" href="https://i.postimg.cc/Y2g29xsg/Design-sans-titre-(30).png" />

<meta charset="utf-8" />
<title>Autour de Moi - Les Blockhaus Lyssois</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>

html, body {
    height:100%;
    margin:0;
}

#map {
    height:100%;
    width:100%;
}


/* GPS */

.gps-circle {
    stroke:white;
    stroke-width:4;
    fill:#007bff;
    fill-opacity:0.9;
}

.gps-pulse {
    stroke:none;
    fill:#007bff;
    fill-opacity:0.25;
}


/* Labels proches */

.label-nearby {

    background-color:rgba(255,255,255,0.9);
    border-radius:4px;
    padding:2px 6px;
    font-size:12px;
    font-weight:bold;
    border:1px solid #007bff;

}


/* Bouton localisation */

.my-location-btn {

    background:white;
    padding:6px 10px;
    border:2px solid #007bff;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;

}


.leaflet-bottom.leaflet-right {
    margin-bottom:60px;
}



/* =========================
   MENU PARAMETRES
========================= */


.settings-control {

    background:white;
    padding:8px 10px;
    border:2px solid #007bff;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;

}


.settings-menu {

    background:white;
    margin-top:5px;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
    display:none;
    font-size:14px;

}


.settings-menu label {

    display:block;
    margin:8px 0;
    cursor:pointer;

}


</style>

</head>


<body>


<div id="map"></div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>


<script>


// ===============================
// INITIALISATION CARTE
// ===============================


var map = L.map('map',{
    zoomControl:true,
    tap:true
});


L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 attribution:'&copy; OpenStreetMap contributors'
}
).addTo(map);



// ===============================
// ANTI MISE EN VEILLE
// ===============================


let wakeLock=null;


async function enableWakeLock(){

try{

wakeLock=await navigator.wakeLock.request('screen');

}
catch(err){

console.log(err);

}

}



document.addEventListener('click',function initWake(){

enableWakeLock();

document.removeEventListener('click',initWake);

});



// ===============================
// VARIABLES
// ===============================


var gpsCircle;
var gpsPulse;

var pulseInterval;

var kmlPoints=[];

var nearbyLabels=[];

var followUser=true;



// ===============================
// DISTANCE
// ===============================


function distanceKm(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;

const dLon=(lon2-lon1)*Math.PI/180;


const a=

Math.sin(dLat/2)**2+

Math.cos(lat1*Math.PI/180)*

Math.cos(lat2*Math.PI/180)*

Math.sin(dLon/2)**2;


return R*2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

}

// ===============================
// CREATION GPS
// ===============================


function createGpsPoint(latlng){


if(gpsCircle){

    gpsCircle.setLatLng(latlng);

}else{


    gpsCircle=L.circleMarker(latlng,{

        radius:14,
        color:'white',
        weight:4,
        fillColor:'#007bff',
        fillOpacity:0.9

    })
    .addTo(map)
    .bindPopup("📍 Vous êtes ici");


}



if(gpsPulse){

    gpsPulse.setLatLng(latlng);

}else{


    gpsPulse=L.circle(latlng,{

        radius:40,
        color:'#007bff',
        fillColor:'#007bff',
        fillOpacity:0.25,
        interactive:false

    })
    .addTo(map);


}



if(followUser){

    map.panTo(latlng);

}



// Animation

if(!pulseInterval){


var scale=1;


pulseInterval=setInterval(function(){


if(!map.hasLayer(gpsPulse)) return;


scale+=0.05;


gpsPulse.setRadius(40*scale);


if(scale>2)
scale=1;


},50);


}


}




// ===============================
// LABELS A MOINS DE 5 KM
// ===============================


function updateNearbyLabels(latlng){



nearbyLabels.forEach(function(l){

map.removeLayer(l);

});


nearbyLabels=[];



kmlPoints.forEach(function(pt){



var d=distanceKm(

latlng[0],
latlng[1],
pt.lat,
pt.lng

);



if(d<=5){



var label=L.marker(

[pt.lat,pt.lng],

{

icon:L.divIcon({

className:'label-nearby',

html:pt.name,

iconSize:[100,20],

iconAnchor:[50,10]

}),

interactive:false

}


)
.addTo(map);



nearbyLabels.push(label);



}



});



}




// ===============================
// CHARGEMENT DES KML
// ===============================


var kmlLayer=null;



function loadKml(filename){


    // Suppression ancien KML
    if(kmlLayer){
        map.removeLayer(kmlLayer);
    }


    // Suppression anciennes étiquettes
    nearbyLabels.forEach(function(label){
        map.removeLayer(label);
    });

    nearbyLabels=[];


    // Réinitialisation des points
    kmlPoints=[];



    kmlLayer=omnivore.kml(filename)

    .on('ready',function(){


        kmlLayer.eachLayer(function(layer){


            if(layer.feature && layer.feature.geometry){


                const coords =
                layer.feature.geometry.coordinates;


                const latlng=[
                    coords[1],
                    coords[0]
                ];


                const name =
                layer.feature.properties.name ||
                "Blockhaus";



                kmlPoints.push({

                    lat:latlng[0],
                    lng:latlng[1],
                    name:name

                });



                layer.bindPopup(

                    "<b>"+name+"</b><br>"+
                    (layer.feature.properties.description || "")

                );


            }


        });


        // Recharge les étiquettes avec la nouvelle liste
        if(gpsCircle){

            updateNearbyLabels(
                gpsCircle.getLatLng()
            );

        }


    })

    .addTo(map);

}



}



// Chargement par défaut

loadKml("pointsv6.kml");





// ===============================
// MENU PARAMETRES
// ===============================


var settingsControl=L.control({
position:'topright'
});



settingsControl.onAdd=function(map){



var container=L.DomUtil.create('div');



var button=L.DomUtil.create(
'div',
'settings-control',
container
);



button.innerHTML="⚙ Paramètres";




var menu=L.DomUtil.create(
'div',
'settings-menu',
container
);



menu.innerHTML=`

<label>

<input type="radio"
name="kml"
value="pointsv6.kml"
checked>

Tout montrer

</label>


<label>

<input type="radio"
name="kml"
value="pointsexistants1.kml">

Constructions encore existantes

</label>

`;





button.onclick=function(){


if(menu.style.display==="block"){


menu.style.display="none";


}else{


menu.style.display="block";


}


};





menu.querySelectorAll(
"input"
)
.forEach(function(input){



input.onchange=function(){



loadKml(this.value);



// fermeture automatique

menu.style.display="none";


};



});





L.DomEvent.disableClickPropagation(container);



return container;



};



settingsControl.addTo(map);
    
// ===============================
// BOUTON MA LOCALISATION
// ===============================


var locateControl=L.control({
position:'bottomright'
});



locateControl.onAdd=function(map){



var div=L.DomUtil.create(
'div',
'my-location-btn'
);



div.innerHTML="📍 Ma localisation";



div.onclick=function(){



followUser=true;



if(gpsCircle){

map.setView(
gpsCircle.getLatLng(),
16
);

}



};



return div;


};



locateControl.addTo(map);





// ===============================
// DESACTIVE SUIVI SI DEPLACEMENT
// ===============================


map.on('dragstart',function(){

followUser=false;

});





// ===============================
// GPS TEMPS REEL
// ===============================


if(navigator.geolocation){



navigator.geolocation.watchPosition(


function(position){



var latlng=[

position.coords.latitude,

position.coords.longitude

];




if(!gpsCircle){


map.setView(
latlng,
16
);


}




createGpsPoint(latlng);


updateNearbyLabels(latlng);



},



function(err){


alert(
"Impossible d'accéder à votre position : "
+
err.message
);


},



{


enableHighAccuracy:true,

maximumAge:0,

timeout:15000


}



);



}else{


alert(
"La géolocalisation n'est pas supportée par votre navigateur"
);


}



</script>


</body>

</html>
