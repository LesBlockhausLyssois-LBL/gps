<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GPS Mobile - Déplacement libre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
html, body { height:100%; margin:0; }
#map { height:100%; width:100%; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<script>
var map = L.map('map', { zoomControl:true, tap:true }).fitWorld();

// Fond OSM
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// KML
var kmlLayer = omnivore.kml('points.kml')
    .on('ready', function() { map.fitBounds(kmlLayer.getBounds()); })
    .on('layeradd', function(e) {
        var layer = e.layer;
        if(layer.feature && layer.feature.properties){
            var name = layer.feature.properties.name || "";
            var desc = layer.feature.properties.description || "";
            layer.bindPopup("<b>"+name+"</b><br>"+desc);
        }
    })
    .addTo(map);

// GPS mobile
var gpsCircle, gpsPulse;
var pulseInterval;

function updateLocation(latlng){
    if(gpsCircle) map.removeLayer(gpsCircle);
    if(gpsPulse) map.removeLayer(gpsPulse);
    if(pulseInterval) clearInterval(pulseInterval);

    // Cercle bleu cliquable
    gpsCircle = L.circleMarker(latlng, {
        radius:14,
        color:'white',
        weight:4,
        fillColor:'#007bff',
        fillOpacity:0.9
    }).addTo(map)
      .bindPopup("📍 Vous êtes ici")
      .openPopup();

    // Cercle pulse **non interactif**
    gpsPulse = L.circle(latlng, {
        radius:40,
        color:'#007bff',
        fillColor:'#007bff',
        fillOpacity:0.25,
        interactive:false  // NE BLOQUE PAS LE TOUCH
    }).addTo(map);

    // Animation pulse
    var scale = 1;
    pulseInterval = setInterval(function(){
        if(!map.hasLayer(gpsPulse)) return clearInterval(pulseInterval);
        scale += 0.05;
        gpsPulse.setRadius(40*scale);
        if(scale>2) scale=1;
    },50);
}

// GPS temps réel
if(navigator.geolocation){
    navigator.geolocation.watchPosition(function(position){
        var latlng = [position.coords.latitude, position.coords.longitude];
        updateLocation(latlng);
        map.setView(latlng, Math.max(map.getZoom(),14));
    }, function(err){
        alert("Impossible d'accéder à votre position : "+err.message);
    },{
        enableHighAccuracy:true,
        maximumAge:1000,
        timeout:10000
    });
}else{
    alert("Géolocalisation non supportée par votre navigateur");
}
</script>

</body>
</html>
