<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GPS Mobile - Blockhaus à proximité</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; width:100%; }

.gps-circle {
    stroke:white;
    stroke-width:4;
    fill:#007bff;
    fill-opacity:0.9;
}

.gps-pulse {
    stroke:none;
    fill:#007bff;
    fill-opacity:0.25;
}

.label-nearby {
    background-color: rgba(255,255,255,0.9);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid #007bff;
}

.my-location-btn {
    background: white;
    padding: 6px 10px;
    border: 2px solid #007bff;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}
.leaflet-bottom.leaflet-right { margin-bottom: 60px; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<script>

var map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors'
}).addTo(map);

var gpsMarker = null;
var firstFix = true;

// =======================
// CREER OU METTRE A JOUR LE POINT
// =======================

function updateGps(lat, lng){

    var latlng = [lat, lng];

    if(!gpsMarker){
        gpsMarker = L.circleMarker(latlng,{
            radius:12,
            color:'#ffffff',
            weight:4,
            fillColor:'#007bff',
            fillOpacity:1
        }).addTo(map).bindPopup("📍 Vous êtes ici");
    } else {
        gpsMarker.setLatLng(latlng);
    }

    // Premier signal → on centre la carte
    if(firstFix){
        map.setView(latlng, 17);
        firstFix = false;
    }
}

// =======================
// ERREUR GPS
// =======================

function gpsError(err){
    alert("Erreur GPS : " + err.message +
          "\n\nVérifie que :\n- Le GPS est activé\n- Le site est en HTTPS\n- La permission est autorisée");
}

// =======================
// LANCER LE GPS
// =======================

if(navigator.geolocation){

    navigator.geolocation.watchPosition(function(position){

        updateGps(
            position.coords.latitude,
            position.coords.longitude
        );

    }, gpsError, {
        enableHighAccuracy:true,
        maximumAge:0,
        timeout:15000
    });

} else {
    alert("Géolocalisation non supportée par ce navigateur");
}

</script>

</body>
</html>
