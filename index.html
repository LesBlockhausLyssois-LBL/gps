<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GPS Mobile - Blockhaus à proximité</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; width:100%; }

.gps-circle {
    stroke:white;
    stroke-width:4;
    fill:#007bff;
    fill-opacity:0.9;
}

.gps-pulse {
    stroke:none;
    fill:#007bff;
    fill-opacity:0.25;
}

.label-nearby {
    background-color: rgba(255,255,255,0.9);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid #007bff;
}

.my-location-btn {
    background: white;
    padding: 6px 10px;
    border: 2px solid #007bff;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}
.leaflet-bottom.leaflet-right { margin-bottom: 60px; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<script>

// =======================
// INITIALISATION CARTE
// =======================

var map = L.map('map', { zoomControl:true });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors'
}).addTo(map);

// =======================
// VARIABLES
// =======================

var gpsCircle, gpsPulse;
var pulseInterval;
var kmlPoints = [];
var nearbyLabels = [];
var followUser = true;

// =======================
// DISTANCE EN KM
// =======================

function distanceKm(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) *
              Math.cos(lat2*Math.PI/180) *
              Math.sin(dLon/2)**2;
    const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R*c;
}

// =======================
// CREATION / UPDATE GPS
// =======================

function createGpsPoint(latlng){

    if(gpsCircle){
        gpsCircle.setLatLng(latlng);
        gpsPulse.setLatLng(latlng);
    } else {

        gpsCircle = L.circleMarker(latlng,{
            radius:14,
            color:'white',
            weight:4,
            fillColor:'#007bff',
            fillOpacity:0.9
        }).addTo(map).bindPopup("📍 Vous êtes ici");

        gpsPulse = L.circle(latlng,{
            radius:40,
            color:'#007bff',
            fillColor:'#007bff',
            fillOpacity:0.25,
            interactive:false
        }).addTo(map);

        // Animation pulse
        var scale = 1;
        pulseInterval = setInterval(function(){
            scale += 0.05;
            gpsPulse.setRadius(40 * scale);
            if(scale > 2) scale = 1;
        },50);
    }
}

// =======================
// BLOCKHAUS PROCHES
// =======================

function updateNearbyLabels(latlng){

    nearbyLabels.forEach(l => map.removeLayer(l));
    nearbyLabels = [];

    kmlPoints.forEach(pt => {

        const d = distanceKm(latlng[0], latlng[1], pt.lat, pt.lng);

        if(d <= 5){

            const label = L.marker([pt.lat, pt.lng],{
                icon: L.divIcon({
                    className:'label-nearby',
                    html: pt.name,
                    iconSize:[100,20],
                    iconAnchor:[50,10]
                }),
                interactive:false
            }).addTo(map);

            nearbyLabels.push(label);
        }
    });
}

// =======================
// CHARGEMENT KML
// =======================

var kmlLayer = omnivore.kml('points.kml')
.on('ready', function(){

    kmlLayer.eachLayer(function(layer){

        if(layer.feature && layer.feature.geometry){

            const coords = layer.feature.geometry.coordinates;
            const latlng = [coords[1], coords[0]];
            const name = layer.feature.properties.name || "Blockhaus";

            kmlPoints.push({
                lat: latlng[0],
                lng: latlng[1],
                name: name
            });

            layer.bindPopup("<b>"+name+"</b><br>"+(layer.feature.properties.description || ""));
        }
    });
})
.addTo(map);

// =======================
// BOUTON LOCALISATION
// =======================

var locateControl = L.control({position:'bottomright'});

locateControl.onAdd = function(map){
    var div = L.DomUtil.create('div','my-location-btn');
    div.innerHTML = 'Ma localisation';

    div.onclick = function(){
        followUser = true;
        if(gpsCircle){
            map.setView(gpsCircle.getLatLng(),17,{animate:true});
        }
    };

    return div;
};

locateControl.addTo(map);

// Si l'utilisateur déplace la carte, on désactive le suivi
map.on('dragstart', function(){
    followUser = false;
});

// =======================
// SUIVI GPS TEMPS REEL
// =======================

if(navigator.geolocation){

    navigator.geolocation.watchPosition(function(pos){

        var latlng = [pos.coords.latitude, pos.coords.longitude];

        createGpsPoint(latlng);
        updateNearbyLabels(latlng);

        if(followUser){
            map.setView(latlng,17,{animate:true});
        }

    }, function(err){
        alert("Erreur GPS : " + err.message);
    },{
        enableHighAccuracy:true,
        maximumAge:0,
        timeout:15000
    });

} else {
    alert("Géolocalisation non supportée");
}

</script>

</body>
</html>
