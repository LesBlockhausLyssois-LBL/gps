<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>GPS Mobile avec OpenStreetMap + KML</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        /* Cercle GPS */
        .gps-circle {
            stroke: white;
            stroke-width: 3;
            fill: #007bff;
            fill-opacity: 0.9;
        }
        /* Cercle pulse */
        .gps-pulse {
            stroke: none;
            fill: #007bff;
            fill-opacity: 0.3;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<script>
    // Carte
    var map = L.map('map', {
        zoomControl: true,
        dragging: true,
        tap: true // optimisé pour mobile
    }).fitWorld(); // affichage initial full world

    // Fond OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Chargement du KML
    var kmlLayer = omnivore.kml('points.kml')
        .on('ready', function() { map.fitBounds(kmlLayer.getBounds()); })
        .on('layeradd', function(e) {
            var layer = e.layer;
            if (layer.feature && layer.feature.properties) {
                var name = layer.feature.properties.name || "";
                var desc = layer.feature.properties.description || "";
                layer.bindPopup("<b>" + name + "</b><br>" + desc, {closeButton: true, autoClose: false});
            }
        })
        .addTo(map);

    // Suivi GPS mobile en temps réel
    var gpsCircle, gpsPulse;

    function updateLocation(latlng) {
        // Supprime anciens cercles
        if(gpsCircle) map.removeLayer(gpsCircle);
        if(gpsPulse) map.removeLayer(gpsPulse);

        // Cercle bleu vectoriel
        gpsCircle = L.circleMarker(latlng, {
            radius: 10, // taille légèrement plus grande pour mobile
            color: 'white',
            weight: 3,
            fillColor: '#007bff',
            fillOpacity: 0.9
        }).addTo(map)
          .bindPopup("📍 Vous êtes ici")
          .openPopup();

        // Cercle pulse animé
        gpsPulse = L.circle(latlng, {
            radius: 30,
            color: '#007bff',
            fillColor: '#007bff',
            fillOpacity: 0.3
        }).addTo(map);

        // Animation pulse
        var scale = 1;
        var pulseInterval = setInterval(function() {
            if(!map.hasLayer(gpsPulse)) {
                clearInterval(pulseInterval);
                return;
            }
            scale += 0.05;
            gpsPulse.setRadius(30 * scale);
            if(scale > 2) scale = 1;
        }, 50);
    }

    // Utilise le GPS du mobile
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(function(position) {
            var latlng = [position.coords.latitude, position.coords.longitude];
            updateLocation(latlng);
            map.setView(latlng, map.getZoom()); // centre la carte sur la position
        }, function(err) {
            alert("Impossible d'accéder à votre position : " + err.message);
        }, {
            enableHighAccuracy: true,
            maximumAge: 1000,
            timeout: 10000
        });
    } else {
        alert("Géolocalisation non supportée par votre navigateur");
    }

</script>

</body>
</html>
