<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>GPS avec OpenStreetMap + KML</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }

        /* Cercle GPS */
        .gps-circle {
            stroke: white;
            stroke-width: 3;
            fill: #007bff;
            fill-opacity: 0.9;
        }

        /* Cercle pulse */
        .gps-pulse {
            stroke: none;
            fill: #007bff;
            fill-opacity: 0.3;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<script>
    // Carte
    var map = L.map('map').setView([48.8566, 2.3522], 12);

    // Fond OSM
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Chargement du KML
    var kmlLayer = omnivore.kml('points.kml')
        .on('ready', function() { map.fitBounds(kmlLayer.getBounds()); })
        .on('layeradd', function(e) {
            var layer = e.layer;
            if (layer.feature && layer.feature.properties) {
                var name = layer.feature.properties.name || "";
                var desc = layer.feature.properties.description || "";
                layer.bindPopup("<b>" + name + "</b><br>" + desc);
            }
        })
        .addTo(map);

    // Suivi GPS
    map.locate({ setView: true, maxZoom: 16 });

    var gpsCircle, gpsPulse;

    map.on('locationfound', function(e) {
        var latlng = e.latlng;

        // Cercle bleu vectoriel
        gpsCircle = L.circleMarker(latlng, {
            radius: 8,
            color: 'white',
            weight: 3,
            fillColor: '#007bff',
            fillOpacity: 0.9
        }).addTo(map)
          .bindPopup("📍 Vous êtes ici")
          .openPopup();

        // Cercle pulse (animation)
        gpsPulse = L.circle(latlng, {
            radius: 30,
            color: '#007bff',
            fillColor: '#007bff',
            fillOpacity: 0.3
        }).addTo(map);

        // Animation pulse avec intervalle
        var scale = 1;
        setInterval(function() {
            scale += 0.05;
            gpsPulse.setRadius(30 * scale);
            if(scale > 2) scale = 1;
        }, 50);
    });

    map.on('locationerror', function() {
        alert("Impossible d'accéder à votre position.");
    });

</script>

</body>
</html>
