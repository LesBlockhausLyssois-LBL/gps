<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>GPS Mobile - Point Visible</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        /* Cercle GPS */
        .gps-circle {
            stroke: white;
            stroke-width: 4;
            fill: #007bff;
            fill-opacity: 0.9;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<script>
    var map = L.map('map', { zoomControl: true, tap: true }).fitWorld();

    // Fond OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // KML
    var kmlLayer = omnivore.kml('points.kml')
        .on('ready', function() { map.fitBounds(kmlLayer.getBounds()); })
        .on('layeradd', function(e) {
            var layer = e.layer;
            if (layer.feature && layer.feature.properties) {
                var name = layer.feature.properties.name || "";
                var desc = layer.feature.properties.description || "";
                layer.bindPopup("<b>" + name + "</b><br>" + desc);
            }
        })
        .addTo(map);

    // GPS mobile
    var gpsCircle;
    var gpsPulse;
    var pulseInterval;

    function updateLocation(latlng) {
        if(gpsCircle) map.removeLayer(gpsCircle);
        if(gpsPulse) map.removeLayer(gpsPulse);
        if(pulseInterval) clearInterval(pulseInterval);

        // Cercle bleu plus grand pour mobile
        gpsCircle = L.circleMarker(latlng, {
            radius: 14,        // taille plus visible
            color: 'white',
            weight: 4,
            fillColor: '#007bff',
            fillOpacity: 0.9
        }).addTo(map)
          .bindPopup("📍 Vous êtes ici")
          .openPopup();

        // Cercle pulse plus large
        gpsPulse = L.circle(latlng, {
            radius: 40,       // plus large pour mobile
            color: '#007bff',
            fillColor: '#007bff',
            fillOpacity: 0.25
        }).addTo(map);

        // Animation pulse simple
        var scale = 1;
        pulseInterval = setInterval(function() {
            if(!map.hasLayer(gpsPulse)) return clearInterval(pulseInterval);
            scale += 0.05;
            gpsPulse.setRadius(40 * scale);
            if(scale > 2) scale = 1;
        }, 50);
    }

    // Utilise GPS mobile en temps réel
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(function(position) {
            var latlng = [position.coords.latitude, position.coords.longitude];
            updateLocation(latlng);
            map.setView(latlng, Math.max(map.getZoom(), 14)); // zoom minimum 14
        }, function(err) {
            alert("Impossible d'accéder à votre position : " + err.message);
        }, {
            enableHighAccuracy: true,
            maximumAge: 1000,
            timeout: 10000
        });
    } else {
        alert("Géolocalisation non supportée par votre navigateur");
    }
</script>

</body>
</html>
