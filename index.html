<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>GPS Mobile - Centré au départ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
html, body { height:100%; margin:0; }
#map { height:100%; width:100%; }

.gps-circle { stroke:white; stroke-width:4; fill:#007bff; fill-opacity:0.9; }
.gps-pulse { stroke:none; fill:#007bff; fill-opacity:0.25; }

.label-nearby {
    background-color: rgba(255,255,255,0.9);
    border-radius: 4px;
    padding: 2px 4px;
    font-size: 12px;
    font-weight: bold;
    border: 1px solid #007bff;
}

.my-location-btn {
    background: white;
    padding: 6px 10px;
    border: 2px solid #007bff;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}
.leaflet-bottom.leaflet-right {
    margin-bottom: 60px;
}
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<script>
// Carte
var map = L.map('map', { zoomControl:true, tap:true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

// Variables GPS
var gpsCircle, gpsPulse;
var pulseInterval;
var _centered = false;

// Stockage points KML et labels
var kmlPoints = [];
var nearbyLabels = [];
var kmlLoaded = false;

// Distance Haversine
function distanceKm(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R*c;
}

// Créer ou déplacer le point GPS
function createGpsPoint(latlng){
    if(gpsCircle) gpsCircle.setLatLng(latlng);
    else gpsCircle = L.circleMarker(latlng,{
        radius:14, color:'white', weight:4, fillColor:'#007bff', fillOpacity:0.9
    }).addTo(map).bindPopup("📍 Vous êtes ici");

    if(gpsPulse) gpsPulse.setLatLng(latlng);
    else gpsPulse = L.circle(latlng,{
        radius:40, color:'#007bff', fillColor:'#007bff', fillOpacity:0.25, interactive:false
    }).addTo(map);

    if(!pulseInterval){
        var scale = 1;
        pulseInterval = setInterval(function(){
            if(!map.hasLayer(gpsPulse)) return clearInterval(pulseInterval);
            scale += 0.05;
            gpsPulse.setRadius(40*scale);
            if(scale>2) scale = 1;
        },50);
    }
}

// Mettre à jour les points dans un rayon de 5 km
function updateNearbyLabels(latlng){
    if(!kmlLoaded) return;
    nearbyLabels.forEach(l=>map.removeLayer(l));
    nearbyLabels = [];
    kmlPoints.forEach(pt=>{
        const d = distanceKm(latlng[0], latlng[1], pt.lat, pt.lng);
        if(d <= 5){
            var markerOptions = {};
            if(pt.iconUrl){
                markerOptions.icon = L.icon({
                    iconUrl: pt.iconUrl,
                    iconSize: [32,32],
                    iconAnchor: [16,32],
                    popupAnchor: [0,-32]
                });
            }
            var marker = L.marker([pt.lat, pt.lng], markerOptions)
                .addTo(map)
                .bindPopup("<b>"+pt.name+"</b>");
            nearbyLabels.push(marker);
        }
    });
}

// Charger KML et assigner icônes
var kmlLayer = omnivore.kml('points.kml')
    .on('ready', function(){
        kmlLoaded = true;
        kmlLayer.eachLayer(function(layer){
            if(layer.feature && layer.feature.geometry){
                const coords = layer.feature.geometry.coordinates;
                const latlng = [coords[1], coords[0]];
                const name = layer.feature.properties.name || "";

                // Déterminer icône selon type
                var iconUrl = null;
                if(name.toLowerCase().includes("barrage")) iconUrl = "icons/cross.png";
                else if(name.toLowerCase().includes("mine")) iconUrl = "icons/explosion.png";
                else if(name.startsWith("BEF")) iconUrl = "icons/blockhaus_red.png";
                else if(name.startsWith("B")) iconUrl = "icons/blockhaus_blue.png";

                // Stocker toutes les infos
                kmlPoints.push({
                    lat: latlng[0],
                    lng: latlng[1],
                    name: name,
                    iconUrl: iconUrl
                });

                // Marker permanent sur la carte
                var markerOptions = {};
                if(iconUrl){
                    markerOptions.icon = L.icon({
                        iconUrl: iconUrl,
                        iconSize: [32,32],
                        iconAnchor: [16,32],
                        popupAnchor: [0,-32]
                    });
                }
                L.marker(latlng, markerOptions)
                    .addTo(map)
                    .bindPopup("<b>"+name+"</b><br>"+(layer.feature.properties.description||""));
            }
        });

        // Dès que KML est prêt, mettre à jour les points proches
        if(gpsCircle) updateNearbyLabels(gpsCircle.getLatLng());
    })
    .addTo(map);

// Bouton “Ma localisation”
var locateControl = L.control({position:'bottomright'});
locateControl.onAdd = function(map){
    var div = L.DomUtil.create('div','my-location-btn');
    div.innerHTML = 'Ma localisation';
    div.onclick = function(){
        if(gpsCircle) map.setView(gpsCircle.getLatLng(),16);
    };
    return div;
};
locateControl.addTo(map);

// GPS temps réel
if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(position){
        var latlng = [position.coords.latitude, position.coords.longitude];
        map.setView(latlng,16); // centre la carte
        createGpsPoint(latlng);
        updateNearbyLabels(latlng);

        navigator.geolocation.watchPosition(function(pos){
            var latlng = [pos.coords.latitude, pos.coords.longitude];
            createGpsPoint(latlng);
            updateNearbyLabels(latlng);
        },{
            enableHighAccuracy:true, maximumAge:1000, timeout:10000
        });

    }, function(err){
        alert("Impossible d'accéder à votre position : "+err.message);
    },{
        enableHighAccuracy:true, maximumAge:1000, timeout:10000
    });
}else{
    alert("Géolocalisation non supportée par votre navigateur");
}
</script>
</body>
</html>
